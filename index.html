<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1f5d3a">
  <title>大雪山鳥點 Checklist</title>
  <style>
    :root {
      --bg: #f7f3e8;
      --card: #ffffff;
      --ink: #172018;
      --muted: #667064;
      --green: #1f6f43;
      --green-dark: #143d2a;
      --green-soft: #e7f4eb;
      --line: #dbe2d9;
      --star: #b8322a;
      --shadow: 0 8px 26px rgba(25, 45, 25, .10);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 0% 0%, rgba(91, 145, 87, .18), transparent 32rem),
        linear-gradient(180deg, #fbf8ef 0%, var(--bg) 100%);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      line-height: 1.45;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 50;
      padding: 16px 14px 8px;
      background: rgba(247, 243, 232, .94);
      border-bottom: 1px solid rgba(115, 130, 110, .25);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .wrap {
      width: min(1080px, 100%);
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.45rem, 5vw, 2.3rem);
      line-height: 1.15;
      letter-spacing: .02em;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      color: var(--muted);
      font-size: .9rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 10px;
      border: 1px solid rgba(115, 130, 110, .26);
      border-radius: 999px;
      background: rgba(255,255,255,.78);
      white-space: nowrap;
    }

    .progressBox {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      margin-top: 10px;
    }

    .progress {
      height: 12px;
      overflow: hidden;
      border-radius: 999px;
      background: #d9dfd5;
    }

    #progressBar {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, #2a7b4a, #7aa843);
      transition: width .18s ease;
    }

    #progressText {
      min-width: 72px;
      color: var(--green-dark);
      font-weight: 900;
      text-align: right;
    }

    nav {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 10px 0 2px;
      scrollbar-width: none;
    }

    nav::-webkit-scrollbar {
      display: none;
    }

    nav a {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: baseline;
      gap: 6px;
      padding: 9px 12px;
      border: 1px solid rgba(115, 130, 110, .28);
      border-radius: 999px;
      background: #fff;
      color: var(--green-dark);
      font-weight: 850;
      text-decoration: none;
      box-shadow: 0 3px 10px rgba(20, 60, 35, .06);
    }

    nav small {
      color: var(--muted);
      font-weight: 700;
    }

    main {
      padding: 14px 14px 86px;
    }

    .tools {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin: 0 0 12px;
    }

    #searchInput {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 15px;
      padding: 0 14px;
      background: #fff;
      color: var(--ink);
      font-size: 1rem;
      outline: none;
      box-shadow: var(--shadow);
    }

    .buttons {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 14px;
      padding: 10px 12px;
      background: var(--green);
      color: #fff;
      font-size: .95rem;
      font-weight: 900;
      white-space: nowrap;
      box-shadow: 0 5px 14px rgba(31, 111, 67, .22);
      cursor: pointer;
    }

    button.secondary {
      background: #fff;
      color: var(--green-dark);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    .note {
      margin: 12px 0 18px;
      padding: 12px 14px;
      border: 1px solid #e4c460;
      border-radius: 16px;
      background: #fff8dc;
      color: #5b4300;
      font-weight: 800;
    }

    section.site {
      scroll-margin-top: 174px;
      margin: 18px 0;
      overflow: hidden;
      border: 1px solid rgba(115, 130, 110, .24);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .siteHead {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 12px;
      padding: 15px;
      background: linear-gradient(135deg, var(--green-dark), var(--green));
      color: #fff;
    }

    .siteHead h2 {
      margin: 0;
      font-size: 1.35rem;
      line-height: 1.18;
    }

    .subtitle {
      margin-top: 3px;
      opacity: .88;
      font-weight: 700;
    }

    .siteCount {
      min-width: 92px;
      padding: 8px 10px;
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 13px;
      background: rgba(255,255,255,.16);
      text-align: right;
      font-weight: 950;
    }

    .row {
      display: grid;
      grid-template-columns: 50px minmax(0, 1fr) 86px 34px;
      gap: 7px;
      align-items: center;
      min-height: 58px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .row:nth-child(even) {
      background: #fbfcfa;
    }

    .row.checked {
      background: var(--green-soft);
    }

    .row.checked .bird {
      color: #536958;
      text-decoration: line-through;
    }

    .row.hidden {
      display: none;
    }

    .check {
      width: 30px;
      height: 30px;
      accent-color: var(--green);
    }

    .bird {
      min-width: 0;
      overflow-wrap: anywhere;
      font-size: 1.05rem;
      font-weight: 900;
      letter-spacing: .01em;
    }

    .date {
      color: var(--muted);
      font-size: .84rem;
      text-align: right;
      white-space: nowrap;
    }

    .star {
      color: var(--star);
      font-size: 1.45rem;
      font-weight: 950;
      line-height: 1;
      text-align: center;
    }

    .empty {
      display: none;
      padding: 16px;
      color: var(--muted);
      font-weight: 800;
      text-align: center;
      border-top: 1px solid var(--line);
    }

    section.noMatch .empty {
      display: block;
    }

    .backTop {
      position: fixed;
      right: 14px;
      bottom: max(14px, env(safe-area-inset-bottom));
      z-index: 60;
      display: grid;
      place-items: center;
      width: 48px;
      height: 48px;
      border-radius: 999px;
      background: var(--green-dark);
      color: #fff;
      text-decoration: none;
      font-size: 1.3rem;
      font-weight: 900;
      box-shadow: 0 10px 24px rgba(0,0,0,.18);
    }

    @media (min-width: 760px) {
      .tools {
        grid-template-columns: 1fr auto;
        align-items: center;
      }

      .row {
        grid-template-columns: 58px minmax(180px, 1fr) 132px 50px;
        min-height: 54px;
      }

      .date {
        font-size: .95rem;
      }
    }

    @media print {
      header, .tools, .backTop {
        display: none;
      }

      body {
        background: #fff;
      }

      main {
        padding: 0;
      }

      section.site {
        box-shadow: none;
        break-inside: avoid;
      }
    }
  </style>
</head>

    <div id="app"></div>
  </main>

me":"黃胸青鶲","date":"2026/4/27","mark":""},{"name":"五色鳥","date":"2026/4/27","mark":""},{"name":"灰喉山椒鳥","date":"2026/4/26","mark":""},{"name":"棕噪眉","date":"2026/4/26","mark":""},{"name":"黃山雀","date":"2026/4/26","mark":""},{"name":"松鴉","date":"2026/4/25","mark":""},{"name":"深山鶯","date":"2026/4/25","mark":""},{"name":"頭烏線","date":"2026/4/25","mark":"*"},{"name":"褐頭花翼","date":"2026/4/24","mark":""},{"name":"斯氏繡眼（綠繡眼）","date":"2026/4/24","mark":"*"},{"name":"大赤啄木","date":"2026/4/21","mark":""},{"name":"夜鷺","date":"2026/4/20","mark":""},{"name":"山紅頭","date":"2026/4/20","mark":""}]},{"id":"tianchi","name":"小雪山天池","subtitle":"50K","birds":[{"name":"北方中杜鵑","date":"2026/4/29","mark":""},{"name":"青背山雀","date":"2026/4/29","mark":"*"},{"name":"臺灣叢樹鶯","date":"2026/4/29","mark":""},{"name":"深山鶯","date":"2026/4/29","mark":""},{"name":"紅頭山雀","date":"2026/4/29","mark":"*"},{"name":"褐頭花翼","date":"2026/4/29","mark":""},{"name":"冠羽畫眉","date":"2026/4/29","mark":"*"},{"name":"臺灣噪眉","date":"2026/4/29","mark":"*"},{"name":"紋翼畫眉","date":"2026/4/29","mark":"*"},{"name":"黃胸藪眉","date":"2026/4/29","mark":"*"},{"name":"臺灣白眉林鴝","date":"2026/4/29","mark":""},{"name":"栗背林鴝","date":"2026/4/29","mark":"*"},{"name":"煤山雀","date":"2026/4/29","mark":""},{"name":"大冠鷲","date":"2026/4/28","mark":""},{"name":"星鴉","date":"2026/4/28","mark":""},{"name":"臺灣鷦眉","date":"2026/4/28","mark":""},{"name":"白耳畫眉","date":"2026/4/28","mark":""},{"name":"黃腹琉璃","date":"2026/4/28","mark":""},{"name":"黃胸青鶲","date":"2026/4/28","mark":""},{"name":"黑長尾雉","date":"2026/4/28","mark":""},{"name":"松鴉","date":"2026/4/28","mark":""},{"name":"棕面鶯","date":"2026/4/28","mark":""},{"name":"山紅頭","date":"2026/4/28","mark":""},{"name":"繡眼畫眉","date":"2026/4/28","mark":"*"},{"name":"火冠戴菊鳥","date":"2026/4/28","mark":""},{"name":"巨嘴鴉","date":"2026/4/27","mark":""},{"name":"白尾鴝","date":"2026/4/26","mark":""},{"name":"小翼鶇","date":"2026/4/26","mark":""},{"name":"花雀","date":"2026/4/26","mark":""},{"name":"紅胸啄花","date":"2026/4/25","mark":""},{"name":"灰鷽","date":"2026/4/25","mark":""},{"name":"叉尾雨燕","date":"2026/4/21","mark":""},{"name":"綠啄木","date":"2026/4/21","mark":""}]}];
    const STORAGE_KEY = "dasyueshan-bird-checklist-v2";

    const app = document.getElementById("app");
    const progressBar = document.getElementById("progressBar");
    const progressText = document.getElementById("progressText");
    const searchInput = document.getElementById("searchInput");
    const showAllBtn = document.getElementById("showAllBtn");
    const showUncheckedBtn = document.getElementById("showUncheckedBtn");
    const resetBtn = document.getElementById("resetBtn");

    let checkedMap = loadCheckedMap();
    let onlyUnchecked = false;

    function loadCheckedMap() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
      } catch (err) {
        return {};
      }
    }

    function saveCheckedMap() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(checkedMap));
    }

    function makeItemId(siteId, index, birdName) {
      return `${siteId}__${index}__${birdName}`;
    }

    function render() {
      app.innerHTML = SITES.map(site => {
        const rows = site.birds.map((bird, index) => {
          const id = makeItemId(site.id, index, bird.name);
          const checked = Boolean(checkedMap[id]);
          return `
            <label class="row ${checked ? "checked" : ""}"
                   data-id="${id}"
                   data-site="${site.name}"
                   data-bird="${bird.name}">
              <input class="check" type="checkbox" ${checked ? "checked" : ""} aria-label="勾選 ${bird.name}">
              <span class="bird">${bird.name}</span>
              <span class="date">${bird.date}</span>
              <span class="star" aria-label="${bird.mark ? "三隻以上" : ""}">${bird.mark}</span>
            </label>
          `;
        }).join("");

        return `
          <section class="site" id="${site.id}">
            <div class="siteHead">
              <div>
                <h2>${site.name}</h2>
                <div class="subtitle">${site.subtitle}</div>
              </div>
              <div class="siteCount">
                <span class="siteDone" data-site-id="${site.id}">0</span> / ${site.birds.length}
              </div>
            </div>
            <div class="table">${rows}</div>
            <div class="empty">這個鳥點目前沒有符合搜尋條件的鳥種</div>
          </section>
        `;
      }).join("");

      bindCheckboxes();
      updateProgress();
      applyFilter();
    }

    function bindCheckboxes() {
      document.querySelectorAll(".row").forEach(row => {
        const checkbox = row.querySelector(".check");
        checkbox.addEventListener("change", () => {
          const id = row.dataset.id;
          if (checkbox.checked) {
            checkedMap[id] = true;
          } else {
            delete checkedMap[id];
          }
          row.classList.toggle("checked", checkbox.checked);
          saveCheckedMap();
          updateProgress();
          applyFilter();
        });
      });
    }

    function updateProgress() {
      let total = 0;
      let done = 0;

      SITES.forEach(site => {
        let siteDone = 0;

        site.birds.forEach((bird, index) => {
          total++;
          const id = makeItemId(site.id, index, bird.name);
          if (checkedMap[id]) {
            done++;
            siteDone++;
          }
        });

        const siteDoneEl = document.querySelector(`.siteDone[data-site-id="${site.id}"]`);
        if (siteDoneEl) siteDoneEl.textContent = siteDone;
      });

      const pct = total ? Math.round((done / total) * 100) : 0;
      progressBar.style.width = `${pct}%`;
      progressText.textContent = `${done}/${total}`;
    }

    function applyFilter() {
      const keyword = searchInput.value.trim().toLowerCase();

      document.querySelectorAll("section.site").forEach(section => {
        let visibleRows = 0;

        section.querySelectorAll(".row").forEach(row => {
          const haystack = `${row.dataset.site} ${row.dataset.bird}`.toLowerCase();
          const matchesKeyword = !keyword || haystack.includes(keyword);
          const matchesUnchecked = !onlyUnchecked || !row.querySelector(".check").checked;
          const visible = matchesKeyword && matchesUnchecked;

          row.classList.toggle("hidden", !visible);
          if (visible) visibleRows++;
        });

        section.classList.toggle("noMatch", visibleRows === 0);
      });
    }

    searchInput.addEventListener("input", applyFilter);

    showAllBtn.addEventListener("click", () => {
      onlyUnchecked = false;
      searchInput.value = "";
      showUncheckedBtn.textContent = "只看未勾";
      applyFilter();
    });

    showUncheckedBtn.addEventListener("click", () => {
      onlyUnchecked = !onlyUnchecked;
      showUncheckedBtn.textContent = onlyUnchecked ? "取消只看未勾" : "只看未勾";
      applyFilter();
    });

    resetBtn.addEventListener("click", () => {
      if (!confirm("確定要清除所有勾選紀錄嗎？")) return;
      checkedMap = {};
      saveCheckedMap();
      render();
    });

    render();
  </script>
